{% extends "base.html" %}

{% block title %}Giriş Yap{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
    <h2>🔐 Akademisyen Girişi</h2>
    <p>İşlem yapabilmek için lütfen giriş yapın.</p>
    
    <form method="post" class="form-group" style="margin-top: 1.5rem;">
        {% csrf_token %}
        <div style="margin-bottom: 1rem; text-align: left;">
            <label>Kullanıcı Adı</label>
            {{ form.username }}
        </div>
        <div style="margin-bottom: 1.5rem; text-align: left;">
            <label>Şifre</label>
            {{ form.password }}
        </div>
        <button type="submit" style="width: 100%; background-color: #3498db; color: white; font-size: 1.1rem; padding: 0.8rem; border-radius: 5px;">
            Giriş Yap
        </button>
    </form>
</div>

<style>
    .form-group input {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
</style>
{% endblock %}
