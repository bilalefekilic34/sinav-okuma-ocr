{% extends 'base.html' %}

{% block title %}Kağıt Yükle - Sınav Sistemi{% endblock %}

{% block content %}
<div id="sinav-yukle" class="card" style="max-width: 600px; margin: 0 auto; border-top: 4px solid #e67e22;">
    <h2 style="color: #d35400;">📸 Yapay Zeka ile Sınav Okut</h2>
    <p>Sınav kağıdının fotoğrafını yükleyin. Yapay zeka okuyacak ve size onaylamanız için bir önizleme sunacak.</p>

    <form id="uploadForm" enctype="multipart/form-data" class="form-group">
        <label for="sinav_kagidi" style="font-weight: bold;">Sınav Kağıdı (.jpg, .png)</label>
        <input type="file" id="sinav_kagidi" name="sinav_kagidi" accept="image/*" required
            style="border: 1px dashed #ccc; padding: 1rem;">
        <button type="submit" style="background-color: #e67e22; font-size: 1.1rem; padding: 1rem;">🚀 Okut ve Önizle</button>
    </form>

    <div id="uploadResult" style="margin-top: 1.5rem; font-weight: bold; text-align: center; font-size: 1.1rem;"></div>
</div>

<script>
    document.getElementById('uploadForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const resultDiv = document.getElementById('uploadResult');
        resultDiv.innerHTML = "⏳ Yapay Zeka kağıdı okuyor... <br><span style='font-size:0.9rem; color:#666;'>(Bu işlem bilgisayar hızına göre 10-30 saniye sürebilir)</span>";
        resultDiv.style.color = "black";

        const formData = new FormData(this);

        fetch('/okuyucu/kagit-yukle/', {
            method: 'POST',
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                if (data.durum === 'basarili') {
                    resultDiv.innerHTML = "✅ Okuma Tamamlandı! Yönlendiriliyor...";
                    resultDiv.style.color = "green";
                    setTimeout(() => {
                        window.location.href = data.yonlendir;
                    }, 500);
                } else {
                    resultDiv.innerHTML = "❌ Hata: " + data.mesaj;
                    resultDiv.style.color = "red";
                }
            })
            .catch(error => {
                resultDiv.innerHTML = "❌ Sunucu ile iletişim kurulamadı.";
                resultDiv.style.color = "red";
            });
    });
</script>
{% endblock %}
