{% extends "base.html" %}

{% block title %}Derslerim{% endblock %}

{% block content %}
<div class="card" style="margin-top: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3498db; padding-bottom: 1rem; margin-bottom: 1.5rem;">
        <h2 style="color: #2980b9; margin: 0;">📚 Derslerim</h2>
        <a href="{% url 'okuyucu:ders_ekle' %}" style="background-color: #2ecc71; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 5px; font-weight: bold;">+ Yeni Ders Ekle</a>
    </div>

    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="background-color: #ecf0f1; border-bottom: 2px solid #bdc3c7;">
                <th style="padding: 1rem;">Ders Kodu</th>
                <th style="padding: 1rem;">Ders Adı</th>
            </tr>
        </thead>
        <tbody>
            {% for ders in dersler %}
            <tr style="border-bottom: 1px solid #ecf0f1;">
                <td style="padding: 1rem; font-weight: bold;">{{ ders.ders_id }}</td>
                <td style="padding: 1rem;">{{ ders.ders_adi }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2" style="padding: 2rem; text-align: center; color: #7f8c8d;">Henüz size atanmış bir ders bulunmuyor.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
