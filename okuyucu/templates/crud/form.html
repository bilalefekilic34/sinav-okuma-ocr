{% extends "base.html" %}

{% block title %}Form Seçenekleri{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <h2>📝 Bilgi Ekle / Düzenle</h2>
    
    <form method="post" class="form-group" style="margin-top: 1.5rem;">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" style="background-color: #2ecc71; color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 1rem;">
            💾 Kaydet
        </button>
        <a href="javascript:history.back()" style="display:inline-block; margin-left:1rem; color:#7f8c8d; text-decoration:none;">Vazgeç</a>
    </form>
</div>

<style>
    .form-group input, .form-group select {
        width: 100%;
        padding: 0.7rem;
        margin-top: 0.3rem;
        margin-bottom: 1rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }
</style>
{% endblock %}
